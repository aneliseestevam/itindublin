name: Notify Discord on PRs and Issues

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send PR notification
        if: github.event_name == 'pull_request'
        run: |
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg title "${{ github.event.pull_request.title }}" \
            --arg author "${{ github.event.pull_request.user.login }}" \
            --arg url "${{ github.event.pull_request.html_url }}" \
            --arg branch "${{ github.event.pull_request.head.ref }}" \
            '{
              content: "📣 Novo PR aberto!",
              embeds: [
                {
                  title: $title,
                  url: $url,
                  description: "Um novo pull request foi aberto no repositório.",
                  fields: [
                    { name: "Repositório", value: $repo, inline: true },
                    { name: "Autor", value: $author, inline: true },
                    { name: "Branch", value: $branch, inline: true }
                  ]
                }
              ]
            }' > payload.json

          curl -H "Content-Type: application/json" \
               -d @payload.json \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Send Issue notification
        if: github.event_name == 'issues'
        run: |
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg title "${{ github.event.issue.title }}" \
            --arg author "${{ github.event.issue.user.login }}" \
            --arg url "${{ github.event.issue.html_url }}" \
            --arg number "${{ github.event.issue.number }}" \
            '{
              content: "🐛 Nova issue aberta!",
              embeds: [
                {
                  title: $title,
                  url: $url,
                  description: "Uma nova issue foi aberta no repositório.",
                  fields: [
                    { name: "Repositório", value: $repo, inline: true },
                    { name: "Autor", value: $author, inline: true },
                    { name: "Issue #", value: $number, inline: true }
                  ]
                }
              ]
            }' > payload.json

          curl -H "Content-Type: application/json" \
               -d @payload.json \
               "${{ secrets.DISCORD_WEBHOOK_URL }}"